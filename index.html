<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In-progress Dashboard</title>
    <link rel="icon" type="image/x-icon" href="https://lh3.googleusercontent.com/-jPvW3IPZfPE/AAAAAAAAAAI/AAAAAAAAAAA/uOBF3r2eDKU/s66-p-k-no-ns-nd/photo.jpg">
    <link rel="stylesheet" href="./paint.css">
</head>

<body>

    <div class="loading">
        <img src="./assets/logo_animation.gif" alt="">
    </div>

    <div class="nav">
        <a href="http://apps.germanexperts.ae/WorkInProgress"><img class="nav-logo" src="./assets/GE_Logo.png" alt=""></a>
        <p class="title"><span class="title-value"></span> In-progress Dashboard</p>
        <div class="branch-logo">

        </div>
        <div class="refresh-time">
            <img src="./assets/noun-refresh-time-6139788 mod.png" alt="">
            <p class="last-refresh-time"></p>
        </div>
        <img class="nav-icon" src="./assets/settings.png" alt="">
    </div>

    <div class="controls">
        <div class="auto-scroll-div">
            <label for="auto-scroll-checkbox">AUTO-SCROLL</label>
            <input type="checkbox" checked id="auto-scroll-checkbox">
        </div>
        <div class="scroll-speed-div">
            <label for="scroll-speed">SCROLL SPEED</label>
            <div class="speed-btns">
                <div class="s-btn l-s-btn">Low</div>
                <div class="s-btn m-s-btn active">Mid</div>
                <div class="s-btn h-s-btn">High</div>
            </div>
        </div>
    </div>

    <div class="table-label">
        <p>Reqeust Stage</p>
        <p>Job Details</p>
    </div>

    <div class="main-wrapper">
        <div class="list-container">

        </div>
    </div>


    <div class="copyright">
        <p>Copyright <span class="curr-year"></span> © <a href="https://germanexperts.ae/" target="_blank">German
                Experts Car Maintenance LLC</a>. All Rights Reserved </p>
    </div>


    <script src="./script.v1.js"></script>
</body>

</html>
